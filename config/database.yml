default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: postgres
  password: patoinformatico
  host: localhost

development:
  <<: *default
  database: internal_job_board_development

test:
  <<: *default
  database: internal_job_board_test

production:
  <<: *default
  database: internal_job_board_production
  username: <%= ENV.fetch("DB_USERNAME") { 'postgres' } %>
  password: <%= ENV.fetch("DB_PASSWORD") { 'patoinformatico' } %>
  host: <%= ENV.fetch("DB_HOST") { 'localhost' } %>
